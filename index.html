<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Elite Aromas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body { font-family: 'Nunito', sans-serif; background: #0a0a0a; color: white; }
        .serif { font-family: 'DM+Serif+Display', serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="adminPanel()" x-init="init()">

    <nav class="border-b border-white/10 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h1 class="serif text-2xl gold-text">Elite Admin</h1>
            <div class="flex items-center gap-4">
                <button @click="publishToGitHub()" class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-xs uppercase hover:bg-blue-700 transition">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Publicar en la Web
                </button>
                <button @click="logout()" class="text-sm text-gray-400 hover:text-white">Salir</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <!-- Ajustes de WhatsApp y Categorías -->
        <div class="bg-white/5 border border-white/10 p-6 rounded-2xl mb-10 flex flex-wrap gap-6 items-end">
            <div class="flex-1 min-w-[250px]">
                <label class="block text-gray-500 text-[10px] uppercase mb-1">Número de WhatsApp (Sin +)</label>
                <div class="flex gap-2">
                    <input type="text" x-model="config.phone" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-gold-500">
                    <button @click="saveConfig()" class="gold-bg text-black px-4 py-2 rounded-xl font-bold text-xs uppercase hover:opacity-90">Actualizar</button>
                </div>
            </div>
            <div class="flex-1 min-w-[250px]">
                <p class="text-gray-500 text-[10px] uppercase mb-1">Acciones Rápidas</p>
                <button @click="openModal('add')" class="w-full gold-bg text-black px-6 py-2 rounded-xl font-bold text-sm uppercase tracking-tighter hover:scale-[1.02] transition">
                    + Nuevo Artículo
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white/5 border border-white/10 p-6 rounded-2xl">
                <p class="text-gray-400 text-xs uppercase mb-1">Total Productos</p>
                <h3 class="text-3xl font-bold" x-text="products.length">0</h3>
            </div>
            <template x-for="cat in config.categories">
                <div class="bg-white/5 border border-white/10 p-6 rounded-2xl">
                    <p class="text-gray-400 text-xs uppercase mb-1" x-text="'Cat: ' + cat"></p>
                    <h3 class="text-3xl font-bold" x-text="countCat(cat)">0</h3>
                </div>
            </template>
        </div>

        <!-- Search & Filter -->
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" x-model="search" placeholder="Buscar producto..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 flex-1 focus:outline-none focus:border-gold-500">
            <select x-model="filterCat" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none">
                <option value="all">Todas las categorías</option>
                <template x-for="cat in config.categories">
                    <option :value="cat" x-text="cat.charAt(0).toUpperCase() + cat.slice(1)"></option>
                </template>
            </select>
        </div>

        <!-- Table -->
        <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-gray-400 text-xs uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4 font-medium">Producto</th>
                        <th class="px-6 py-4 font-medium">Categoría</th>
                        <th class="px-6 py-4 font-medium">Precio</th>
                        <th class="px-6 py-4 font-medium text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/10">
                    <template x-for="p in filteredProducts" :key="p.id">
                        <tr class="hover:bg-white/[0.02] transition">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <img :src="p.image" class="w-12 h-12 rounded-lg object-cover bg-gray-800" onerror="this.src='https://placehold.co/100x100?text=Sin+Imagen'">
                                    <div>
                                        <div class="font-bold text-white" x-text="p.name"></div>
                                        <div class="text-xs text-gray-500 truncate max-w-[200px]" x-text="p.desc"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-400 uppercase" x-text="p.cat"></td>
                            <td class="px-6 py-4 font-mono gold-text">RD$ <span x-text="Number(p.price).toLocaleString()"></span></td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end gap-2">
                                    <button @click="openModal('edit', p)" class="p-2 hover:bg-blue-500/20 text-blue-400 rounded-lg transition"><i class="fa-solid fa-pen"></i></button>
                                    <button @click="deleteProduct(p.id)" class="p-2 hover:bg-red-500/20 text-red-400 rounded-lg transition"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Producto -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" x-cloak x-transition>
        <div @click.away="showModal = false" class="bg-[#111] border border-white/10 w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h2 class="serif text-2xl gold-text" x-text="editMode ? 'Editar Artículo' : 'Nuevo Artículo'"></h2>
                <button @click="showModal = false" class="text-gray-500 hover:text-white text-2xl">&times;</button>
            </div>
            <form @submit.prevent="saveProduct()" class="p-8 grid grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="block text-gray-500 text-[10px] uppercase mb-1">Nombre</label>
                    <input type="text" x-model="form.name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gold-500">
                </div>
                <div>
                    <label class="block text-gray-500 text-[10px] uppercase mb-1">Categoría</label>
                    <select x-model="form.cat" @change="checkNewCat($event)" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none">
                        <template x-for="cat in config.categories">
                            <option :value="cat" x-text="cat.charAt(0).toUpperCase() + cat.slice(1)"></option>
                        </template>
                        <option value="NEW" class="text-gold-500 font-bold">+ Agregar Nueva Categoría</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-500 text-[10px] uppercase mb-1">Precio (RD$)</label>
                    <input type="number" x-model="form.price" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gold-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-gray-500 text-[10px] uppercase mb-1">Imagen del Producto</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Opción URL -->
                        <div>
                            <input type="text" x-model="form.image" placeholder="Pegar URL de imagen..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-xs focus:outline-none focus:border-gold-500">
                        </div>
                        <!-- Opción Archivo -->
                        <div class="relative">
                            <input type="file" @change="handleFileUpload($event)" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <div class="w-full bg-white/10 border border-dashed border-white/20 rounded-xl px-4 py-3 text-center text-xs text-gray-400">
                                <i class="fa-solid fa-upload mr-2"></i> Subir desde dispositivo
                            </div>
                        </div>
                    </div>
                    <!-- Preview de imagen seleccionada -->
                    <template x-if="form.image">
                        <div class="mt-4 flex items-center gap-4 p-2 bg-white/5 rounded-xl border border-white/10">
                            <img :src="form.image" class="w-16 h-16 object-cover rounded-lg">
                            <span class="text-[10px] text-gray-500 truncate" x-text="form.image.startsWith('data:') ? 'Imagen cargada desde archivo' : form.image"></span>
                            <button type="button" @click="form.image = ''" class="ml-auto text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </template>
                </div>
                <div class="col-span-2">
                    <label class="block text-gray-500 text-[10px] uppercase mb-1">Descripción</label>
                    <textarea x-model="form.desc" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gold-500"></textarea>
                </div>
                <div class="col-span-2 flex gap-4 pt-4">
                    <button type="button" @click="showModal = false" class="flex-1 py-4 border border-white/10 rounded-xl hover:bg-white/5 transition uppercase text-xs font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 gold-bg text-black rounded-xl hover:opacity-90 transition uppercase text-xs font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition x-cloak class="fixed bottom-10 right-10 bg-white text-black px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[200]">
        <div class="bg-green-500 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-check"></i></div>
        <div>
            <p class="font-bold text-sm" x-text="toast.title"></p>
            <p class="text-xs text-gray-500" x-text="toast.msg"></p>
        </div>
    </div>

    <!-- Importar datos por defecto -->
    <script src="../js/data.js"></script>
    <script src="admin-logic.js"></script>
</body>
</html>
