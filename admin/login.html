<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Elite Aromas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #0f0f0f; }
        .serif { font-family: 'DM+Serif+Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #aa8a2e 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 border border-white/10 p-8 rounded-2xl backdrop-blur-xl w-full max-w-md shadow-2xl" data-aos="fade-up">
        <div class="text-center mb-8">
            <h1 class="serif text-4xl text-white mb-2">Elite Aromas</h1>
            <p class="text-gray-400 text-sm uppercase tracking-widest">Panel de Control</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-gray-400 text-xs mb-2 uppercase">Usuario</label>
                <input type="text" id="username" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition" placeholder="email@gmail.com">
            </div>
            <div>
                <label class="block text-gray-400 text-xs mb-2 uppercase">Contraseña</label>
                <input type="password" id="password" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition" placeholder="••••••••">
            </div>
            <button type="submit" class="gold-gradient w-full py-4 rounded-lg text-black font-bold uppercase tracking-widest hover:opacity-90 transition transform hover:scale-[1.02]">
                Entrar al Sistema
            </button>
        </form>
        <p id="errorMsg" class="text-red-400 text-center mt-4 text-sm hidden">Credenciales incorrectas</p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');

        const handleLogin = (e) => {
            if(e) e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple Auth
            if(user === 'elitearomas1401@gmail.com' && pass === 'Elite14011401!') {
                localStorage.setItem('admin_logged', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
                // Efecto de vibración visual al fallar
                loginForm.classList.add('animate-shake');
                setTimeout(() => loginForm.classList.remove('animate-shake'), 500);
            }
        };

        loginForm.addEventListener('submit', handleLogin);

        // Soporte extra para Enter en los campos
        [document.getElementById('username'), document.getElementById('password')].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });
    </script>
</body>
</html>
